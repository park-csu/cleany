[language-server.pyright-docker]
command = "docker"
args = [
  "exec", "-i",
  "--workdir", "/home/user/Workspace/cleany/ros2_ws",
  "cleany-humble-dev",
  "bash", "-lc",
  "source /opt/ros/humble/setup.bash && exec pyright-langserver --stdio",
]

[language-server.pyright-docker.config.python]
pythonVersion = "3.10"

[language-server.pyright-docker.config.python.analysis]
stubPath = "/home/user/Workspace/cleany/ros2_ws/src/cleany_mujoco_sim/typings"
extraPaths = [
  "/opt/ros/humble/lib/python3.10/site-packages",
  "/opt/ros/humble/local/lib/python3.10/dist-packages",
  "/usr/local/lib/python3.10/dist-packages",
  "/home/user/Workspace/cleany/ros2_ws/src/cleany_mujoco_sim",
]

[[language]]
name = "python"
language-servers = ["pyright-docker"]
